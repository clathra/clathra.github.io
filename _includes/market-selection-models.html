<div class="fig" id="fig-msm">
  <div class="fig-head">
    <div class="fig-kicker">Figure</div>
    <div class="fig-title">Two ways to choose a market</div>
  </div>
  <div class="fig-chart">
    <svg viewBox="0 0 640 250" preserveAspectRatio="xMidYMid meet" role="img"
         aria-label="Two schematic panels. On the left, segmental concentration: a firm competes for share within one of several segments. On the right, market specialisation: a firm serves the full range of needs within one chosen niche.">
      <line class="div" x1="320" y1="24" x2="320" y2="226"/>
      <!-- LEFT: segmental concentration -->
      <text class="hd" x="168" y="40">Segmental concentration</text>
      <rect class="seg" x="84" y="58"  width="168" height="26" rx="5"/><text class="sl" x="168" y="75">Segment A</text>
      <rect class="seg sel" x="84" y="90"  width="168" height="26" rx="5"/><text class="sl on" x="168" y="107">Segment B</text>
      <rect class="seg" x="84" y="122" width="168" height="26" rx="5"/><text class="sl" x="168" y="139">Segment C</text>
      <rect class="seg" x="84" y="154" width="168" height="26" rx="5"/><text class="sl" x="168" y="171">Segment D</text>
      <text class="cap" x="168" y="206">Compete for share within one segment.</text>
      <!-- RIGHT: market specialisation -->
      <text class="hd" x="472" y="40">Market specialisation</text>
      <rect class="niche" x="388" y="58" width="168" height="122" rx="8"/>
      <text class="nlab" x="472" y="78">One chosen niche</text>
      <rect class="need" x="408" y="92"  width="128" height="14" rx="4"/>
      <rect class="need" x="408" y="114" width="128" height="14" rx="4"/>
      <rect class="need" x="408" y="136" width="128" height="14" rx="4"/>
      <rect class="need" x="408" y="158" width="128" height="14" rx="4"/>
      <text class="cap" x="472" y="206">Serve the full range of its needs.</text>
    </svg>
  </div>
  <div class="fig-note">A schematic of the two market-selection models, with no scale. The first wins share within a single segment; the second specialises to serve the whole of a chosen niche. After Plomaritou, as applied in Plomaritou and Hadjiconstantinou (2026).</div>
</div>
