<div class="fig" id="fig-ports">

      <rect class="g2" x="180" y="110" width="120" height="120" rx="6"/>
      <text class="ord" x="240" y="140">2nd</text>
      <rect class="g3" x="320" y="70"  width="120" height="160" rx="6"/>
      <text class="ord" x="380" y="100">3rd</text>
      <rect class="g4" x="460" y="30"  width="120" height="200" rx="6"/>
      <text class="ord" x="520" y="60">4th</text>
      <g class="cap">
        <text class="era" x="100" y="250">Pre-1960s</text>

        <text class="era" x="240" y="250">Mid-century</text>

      </g>
    </svg>
  </div>
  <div class="fig-note">A schematic of UNCTAD's port-generation model, with no scale; each generation adds capability to the ones before it. After Menegaki and Alexopoulos (2017).</div>
