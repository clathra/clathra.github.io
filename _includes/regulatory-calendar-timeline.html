<div class="fig" id="fig-reg">

  </div>
  <div class="fig-chart">
    <svg viewBox="0 0 620 300" preserveAspectRatio="xMidYMid meet" role="img"

      <line class="tick" x1="86" y1="184" x2="102" y2="184"/>
      <line class="tick" x1="86" y1="248" x2="102" y2="248"/>
      <circle class="dot" cx="86" cy="56" r="6"/>

      <circle class="dot" cx="86" cy="184" r="6"/>
