<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found · Clathra</title>
<meta name="description" content="The page you were looking for isn't here. Head back to clathra.com.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#0e1726">
<link rel="icon" href="/images/favicon.png" sizes="any">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#fbfcfd;--ink:#0e1726;--ink-soft:#54637a;--line:#e3e9ef;--teal:#059976;--blue:#425fbc;--ease:cubic-bezier(.2,.7,.2,1)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
h1,.brand .name{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;line-height:1.0}
a{color:inherit;text-decoration:none}
a:focus-visible{outline:2px solid var(--teal);outline-offset:3px;border-radius:4px}
.skip{position:absolute;left:-9999px;top:0;z-index:100;background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;font-size:14px}
.skip:focus{left:12px;top:12px}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:64px 64px;-webkit-mask-image:radial-gradient(130% 80% at 50% 8%,#000,transparent 80%);mask-image:radial-gradient(130% 80% at 50% 8%,#000,transparent 80%)}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
nav{padding:22px 0;position:relative;z-index:2}
.nav-in{max-width:1180px;margin:0 auto;padding:0 28px;display:flex;align-items:center}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:36px;width:36px}
.brand .name{font-weight:600;font-size:23px;color:var(--ink)}
main{flex:1;display:flex;align-items:center;position:relative;z-index:2}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px;width:100%}
.code{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#036b53}
h1{font-size:clamp(3rem,11vw,8rem);margin-top:14px}
h1 .g{background:linear-gradient(100deg,var(--teal),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--ink-soft);font-size:1.15rem;max-width:46ch;margin-top:18px}
.actions{display:flex;gap:14px;margin-top:32px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:500;font-size:15px;padding:13px 24px;border-radius:999px;border:1px solid transparent;transition:transform .25s var(--ease),box-shadow .25s,border-color .25s}
.btn-p{background:var(--ink);color:#fff}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 28px -10px rgba(14,23,38,.5)}
.btn-g{border-color:var(--line);color:var(--ink)}
.btn-g:hover{border-color:var(--ink);transform:translateY(-2px)}
footer{position:relative;z-index:2;padding:24px 0;font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft)}
.foot{max-width:1180px;margin:0 auto;padding:0 28px}
@media(prefers-reduced-motion:reduce){canvas{display:none}}
</style>
<script src="/assets/consent.js" defer></script>
</head>
<body>
<a class="skip" href="#main">Skip to content</a>
<canvas id="flow" aria-hidden="true"></canvas>
<nav><div class="nav-in"><a class="brand" href="index.html"><img src="images/logo.svg" alt=""><span class="name">Clathra</span></a></div></nav>
<main id="main">
  <div class="wrap">
    <div class="code">Error 404</div>
    <h1>Off the <span class="g">chart.</span></h1>
    <p>The page you were looking for isn't here. It may have moved, or the link was mistyped.</p>
    <div class="actions">
      <a class="btn btn-p" href="index.html">Back to home</a>
      <a class="btn btn-g" href="index.html#contact">Contact</a>
    </div>
  </div>
</main>
<footer><div class="foot">© Clathra · clathra.com</div></footer>
<script>
(function(){
  var cv=document.getElementById('flow'),ctx=cv.getContext('2d');
  var w,h,dpr,t=0;
  function resize(){dpr=Math.min(devicePixelRatio||1,2);w=cv.clientWidth;h=cv.clientHeight;cv.width=w*dpr;cv.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
  resize();addEventListener('resize',resize);
  var layers=[
    {col:[136,146,189],base:0.58,amp:30,len:0.0015,sp:0.00020,fill:0.10,line:0.16},
    {col:[66,95,188],  base:0.70,amp:42,len:0.0011,sp:-0.00016,fill:0.10,line:0.16},
    {col:[5,153,118],  base:0.80,amp:36,len:0.0018,sp:0.00024,fill:0.13,line:0.26},
    {col:[5,153,118],  base:0.92,amp:54,len:0.0009,sp:-0.00013,fill:0.16,line:0.30}
  ];
  if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  function draw(){
    t+=16;ctx.clearRect(0,0,w,h);
    layers.forEach(function(L,i){
      var baseY=h*L.base,pts=[];
      for(var x=0;x<=w;x+=10){var y=baseY+Math.sin(x*L.len+t*L.sp+i)*L.amp+Math.sin(x*L.len*2.4-t*L.sp*1.7+i)*L.amp*0.38;pts.push([x,y]);}
      ctx.beginPath();ctx.moveTo(0,h);pts.forEach(function(p){ctx.lineTo(p[0],p[1]);});ctx.lineTo(w,h);ctx.closePath();
      var g=ctx.createLinearGradient(0,baseY-L.amp,0,h);
      g.addColorStop(0,'rgba('+L.col[0]+','+L.col[1]+','+L.col[2]+','+L.fill+')');
      g.addColorStop(1,'rgba('+L.col[0]+','+L.col[1]+','+L.col[2]+','+(L.fill*0.18)+')');
      ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();pts.forEach(function(p,k){k?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);});
      ctx.strokeStyle='rgba('+L.col[0]+','+L.col[1]+','+L.col[2]+','+L.line+')';ctx.lineWidth=1.6;ctx.stroke();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
